<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<style>

body{
    background:#00a782;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* container */
.scene{
    position:relative;
    width:90vw;
    max-width:600px;
    height:60vh;
}

/* left image */
.img1{
    position:absolute;
    width:30vw;
    max-width:180px;
    left:0;
    top:35%;
    border-radius:10%;
}

/* right image */
.img2{
    position:absolute;
    width:30vw;
    max-width:180px;
    right:0;
    top:35%;
    z-index:2;
    border-radius:10%;
}

/* swinging image */
.img3{
    position:absolute;
    width:35vw;
    max-width:210px;
    left:10%;
    top:5%;
    transform-origin:bottom right;
    animation:swing 1s ease-in-out infinite;
    z-index:3;
}

@keyframes swing{
    0%{transform:rotate(0deg);}
    50%{transform:rotate(110deg);}
    100%{transform:rotate(0deg);}
}

img{
    max-width:100%;
    height:auto;
}

</style>
</head>

<body onclick="window.location='hai.html'">

<div class="scene">

<img class="img1" src="https://preview.redd.it/freaky-joker-joker-tongue-out-manually-cleaned-up-crop-in-v0-3qegwopj2feg1.png?width=640&crop=smart&auto=webp&s=a6fd105db2b724f08340d512f31e7d0012427eaa">

<img class="img2" src="https://fatson-toddplushies.com/wp-content/uploads/2025/11/Fat-Jason-Todd-Plush-bg-1762948768-300x300.png">

<img class="img3" src="img3.png">

</div>

</body>
</html>
