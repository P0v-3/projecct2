<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boss Fight 🎉</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg1: #1f1a24;
      --bg2: #5d2f67;
      --panel: rgba(255, 247, 252, 0.9);
      --ink: #342536;
      --soft: #715c73;
      --hp-bg: #e7dce7;
      --hp-fill: linear-gradient(90deg, #58c56e, #f2c94c, #ef5350);
      --shadow: rgba(0, 0, 0, 0.24);
      --accent: #7c4dff;
      --accent2: #ff5fb2;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 25%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      color: white;
      display: flex;
      justify-content: center;
      padding: 16px;
      position: relative;
    }

    .wrap {
      width: min(100%, 760px);
      padding-top: 14px;
      padding-bottom: 40px;
    }

    .top-popup {
      position: fixed;
      top: -220px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 500px);
      background: rgba(255,255,255,0.96);
      color: #2f2430;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.28);
      padding: 18px 18px 20px;
      z-index: 50;
      text-align: center;
      transition: top 0.55s cubic-bezier(.2,.8,.2,1);
      border: 1px solid rgba(0,0,0,0.08);
    }

    .top-popup.show {
      top: 0;
    }

    .top-popup h2 {
      margin: 0 0 8px;
      font-size: clamp(24px, 5vw, 34px);
      color: #5d2f67;
    }

    .top-popup p {
      margin: 6px 0;
      font-size: 16px;
      font-weight: 800;
    }

    .boss-panel {
      background: var(--panel);
      border-radius: 26px;
      padding: 18px;
      box-shadow: 0 16px 36px var(--shadow);
      color: var(--ink);
    }

    .boss-title {
      text-align: center;
      margin: 0 0 8px;
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 900;
      letter-spacing: 0.3px;
    }

    .boss-sub {
      text-align: center;
      margin: 0 0 18px;
      color: var(--soft);
      font-weight: 800;
      font-size: 14px;
    }

    .boss-head {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .boss-avatar {
      width: clamp(82px, 20vw, 120px);
      height: clamp(82px, 20vw, 120px);
      border-radius: 999px;
      object-fit: cover;
      border: 4px solid rgba(124, 77, 255, 0.2);
      background: #eee;
      box-shadow: 0 8px 20px rgba(0,0,0,0.14);
    }

    .boss-info {
      flex: 1 1 280px;
      min-width: 0;
    }

    .boss-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .boss-name {
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 900;
      color: #4b2f4f;
    }

    .hp-text {
      font-weight: 900;
      color: #6b556c;
      font-size: 15px;
      white-space: nowrap;
    }

    .hp-shell {
      width: 100%;
      height: 26px;
      border-radius: 999px;
      background: var(--hp-bg);
      overflow: hidden;
      border: 2px solid rgba(0,0,0,0.07);
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.08);
    }

    .hp-fill {
      height: 100%;
      width: 100%;
      background: var(--hp-fill);
      border-radius: inherit;
      transition: width 0.25s ease;
    }

    .arena {
      margin-top: 18px;
      background: rgba(124, 77, 255, 0.08);
      border: 1px solid rgba(124, 77, 255, 0.12);
      border-radius: 22px;
      padding: 18px 14px 22px;
      text-align: center;
    }

    .big-joker {
      width: min(78vw, 280px);
      max-width: 100%;
      border-radius: 22px;
      object-fit: cover;
      box-shadow: 0 12px 26px rgba(0,0,0,0.18);
      background: #eee;
      transition: transform 0.12s ease;
    }

    .big-joker.hit {
      animation: hitShake 0.24s ease;
    }

    @keyframes hitShake {
      0% { transform: translateX(0) scale(1); }
      20% { transform: translateX(-8px) scale(0.98); }
      40% { transform: translateX(8px) scale(1.02); }
      60% { transform: translateX(-6px) scale(0.99); }
      80% { transform: translateX(6px) scale(1.01); }
      100% { transform: translateX(0) scale(1); }
    }

    .attack-row {
      margin-top: 18px;
      display: flex;
      justify-content: center;
    }

    .attack-btn {
      width: min(88vw, 420px);
      min-height: 84px;
      border: 0;
      border-radius: 24px;
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      color: white;
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 900;
      cursor: pointer;
      padding: 16px 18px;
      box-shadow: 0 14px 30px rgba(124, 77, 255, 0.28);
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    .attack-btn:active {
      transform: scale(0.97);
      opacity: 0.94;
    }

    .attack-btn:disabled {
      opacity: 0.65;
      cursor: default;
    }

    .note {
      text-align: center;
      margin-top: 10px;
      color: #eadff0;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    .reward-box {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .reward {
      background: rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 14px;
      text-align: center;
      color: white;
      font-weight: 900;
      backdrop-filter: blur(4px);
    }

    .confetti {
      position: fixed;
      top: -12px;
      width: 10px;
      height: 16px;
      opacity: 0.92;
      z-index: 60;
      animation: fall linear forwards;
      border-radius: 999px;
      pointer-events: none;
    }

    @keyframes fall {
      from { transform: translateY(-10vh) rotate(0deg); }
      to   { transform: translateY(115vh) rotate(720deg); }
    }

    @media (max-width: 600px) {
      .boss-panel {
        padding: 14px;
        border-radius: 22px;
      }

      .boss-head {
        gap: 10px;
      }

      .boss-name-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .hp-shell {
        height: 24px;
      }

      .attack-btn {
        min-height: 78px;
        border-radius: 20px;
      }

      .reward-box {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="top-popup" id="winPopup">
    <h2>YAYYY 🎉</h2>
    <p>yay u defeated the evil man</p>
    <p>+10 candy 🍬</p>
    <p>+1 cake 🎂</p>
  </div>

  <div class="wrap">
    <div class="boss-panel">
      <h1 class="boss-title">BOSS FIGHT</h1>
      <p class="boss-sub">defeat joker to unlock the surprise</p>

      <div class="boss-head">
        <img
          class="boss-avatar"
          id="bossAvatar"
          src="joker.png"
          alt="Joker"
          onerror="this.src='https://placehold.co/300x300/png?text=Joker';"
        />

        <div class="boss-info">
          <div class="boss-name-row">
            <div class="boss-name">Joker</div>
            <div class="hp-text" id="hpText">10 / 10 HP</div>
          </div>

          <div class="hp-shell" aria-label="Boss health bar">
            <div class="hp-fill" id="hpFill"></div>
          </div>
        </div>
      </div>

      <div class="arena">
        <img
          class="big-joker"
          id="bigJoker"
          src="joker.png"
          alt="Joker Boss"
          onerror="this.src='https://placehold.co/600x600/png?text=Joker';"
        />

        <div class="attack-row">
          <button type="button" class="attack-btn" id="attackBtn">HIT THE JOKER 🪓</button>
        </div>
      </div>
    </div>

    <div class="note">every hit removes 1 hp</div>

    <div class="reward-box">
      <div class="reward">Boss HP: <span id="hpMini">10</span></div>
      <div class="reward">Reward waits at 0 HP ✨</div>
    </div>
  </div>

  <script>
    const attackBtn = document.getElementById("attackBtn");
    const hpFill = document.getElementById("hpFill");
    const hpText = document.getElementById("hpText");
    const hpMini = document.getElementById("hpMini");
    const winPopup = document.getElementById("winPopup");
    const bigJoker = document.getElementById("bigJoker");

    let hp = 10;
    const maxHp = 10;
    let finished = false;

    function updateHp() {
      const percent = (hp / maxHp) * 100;
      hpFill.style.width = percent + "%";
      hpText.textContent = `${hp} / ${maxHp} HP`;
      hpMini.textContent = hp;
    }

    function spawnConfetti(count = 150) {
      const colors = ["#ff5fb2", "#7c4dff", "#ffffff", "#ffd166", "#6ee7b7"];
      for (let i = 0; i < count; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2.5 + Math.random() * 2.3) + "s";
        piece.style.animationDelay = (Math.random() * 0.4) + "s";
        piece.style.width = (7 + Math.random() * 6) + "px";
        piece.style.height = (12 + Math.random() * 9) + "px";
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5600);
      }
    }

    function hitEffect() {
      bigJoker.classList.remove("hit");
      void bigJoker.offsetWidth;
      bigJoker.classList.add("hit");
    }

    function winBattle() {
      finished = true;
      attackBtn.disabled = true;
      attackBtn.textContent = "JOKER DEFEATED 💥";
      hp = 0;
      updateHp();
      spawnConfetti(180);
      setTimeout(() => {
        winPopup.classList.add("show");
      }, 180);
    }

    attackBtn.addEventListener("click", () => {
      if (finished) return;
      if (hp <= 0) return;

      hp -= 1;
      hitEffect();
      updateHp();

      if (hp <= 0) {
        winBattle();
      }
    });

    updateHp();
  </script>
</body>
</html>
