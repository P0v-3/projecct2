<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fatson Bonks Joker</title>

<style>

body{
    margin:0;
    background:#00a782;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
}

.scene{
    position:relative;
    width:100vw;
    height:100vh;
}

/* FATSON */
.fatson{
    position:absolute;
    left:5%;
    top:50%;
    transform:translateY(-50%);
    width:250px;
    z-index:3;
    border-radius:20px;
}

/* JOKER */
.joker{
    position:absolute;
    right:5%;
    top:50%;
    transform:translateY(-50%);
    width:250px;
    border-radius:20px;
    z-index:2;
}

/* ARM / SWING */
.arm{
    position:absolute;
    left:230px;
    top:42%;
    width:200px;
    height:200px;
    transform-origin:20px 20px;
    z-index:4;
}

/* CROWBAR */
.crowbar{
    width:200px;
}

/* HINT */
.hint{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.2);
    color:white;
    padding:10px 18px;
    border-radius:40px;
}

</style>
</head>


<body>

<div class="scene">

<img src="fatson.png" class="fatson">

<img src="joker.png" class="joker" id="joker">

<div class="arm" id="arm">
<img src="crowbar.png" class="crowbar">
</div>

<div class="hint">click anywhere</div>

<audio id="bonk">
<source src="bonk.mp3" type="audio/mpeg">
</audio>

</div>


<script>

const arm = document.getElementById("arm");
const joker = document.getElementById("joker");
const bonk = document.getElementById("bonk");

let angle = -20;
let direction = 1;
let speed = 0.5;

let busy = false;

/* IDLE SWING */
function idleSwing(){

    if(!busy){

        angle += speed * direction;

        if(angle > 10) direction = -1;
        if(angle < -20) direction = 1;

        arm.style.transform = "rotate(" + angle + "deg)";
    }

    requestAnimationFrame(idleSwing);
}

idleSwing();


/* BONK HIT */

function bonkHit(){

if(busy) return;

busy = true;

bonk.currentTime = 0;
bonk.play();

arm.style.transition="transform 0.15s";
arm.style.transform="rotate(60deg)";

joker.style.transition="transform 0.1s";
joker.style.transform="translateY(-50%) translateX(20px)";

setTimeout(()=>{

arm.style.transition="transform 0.3s";
arm.style.transform="rotate(-10deg)";

joker.style.transform="translateY(-50%)";

},200);

setTimeout(()=>{
busy=false;
},500);

}


document.body.addEventListener("click", bonkHit);

</script>

</body>
</html>
