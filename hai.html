<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Swing Hit</title>
<style>
body{
    background:#00a782;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.scene{
    position:relative;
    width:90vw;
    max-width:600px;
    height:60vh;
}

/* left image (holds the swing) */
.img1{
    position:absolute;
    width:30vw;
    max-width:180px;
    left:0;
    top:35%;
    border-radius:10%;
}

/* right image (target) */
.img2{
    position:absolute;
    width:30vw;
    max-width:180px;
    right:0;
    top:35%;
    z-index:2;
    border-radius:10%;
}

/* swinging image */
.img3{
    position:absolute;
    width:35vw;
    max-width:210px;
    left:10%;
    top:5%;
    transform-origin:bottom right; /* pivot at bottom-right corner */
    z-index:3;
}
</style>
</head>
<body>

<div class="scene">
    <img class="img1" src="https://preview.redd.it/freaky-joker-joker-tongue-out-manually-cleaned-up-crop-in-v0-3qegwopj2feg1.png?width=640&crop=smart&auto=webp&s=a6fd105db2b724f08340d512f31e7d0012427eaa" id="img1">
    <img class="img2" src="https://fatson-toddplushies.com/wp-content/uploads/2025/11/Fat-Jason-Todd-Plush-bg-1762948768-300x300.png" id="img2">
    <img class="img3" src="img3.png" id="img3">
</div>

<!-- bonk sound -->
<audio id="bonk" src="bonk"></audio>

<script>
// variables
let angle = 0;
let swingSpeed = 2; // degrees per frame
let maxAngle = 110;
let direction = 1; // 1 = forward, -1 = backward
const img3 = document.getElementById('img3');
const bonk = document.getElementById('bonk');

// SWING FUNCTION
function swing(){
    // update angle
    angle += swingSpeed * direction;

    // hit check
    if(angle >= maxAngle){
        angle = maxAngle;
        direction = -1;
        bonk.currentTime = 0;
        bonk.play();
    }
    if(angle <= 0){
        angle = 0;
        direction = 1;
    }

    // apply rotation
    img3.style.transform = `rotate(${angle}deg)`;

    requestAnimationFrame(swing);
}

// CLICK makes it hit immediately
document.body.addEventListener('click', ()=>{
    angle = maxAngle;             // snap to hit position
    img3.style.transform = `rotate(${angle}deg)`;
    bonk.currentTime = 0;
    bonk.play();

    // resume swing backward after short pause
    setTimeout(()=>{
        direction = -1;
    }, 100);
});

requestAnimationFrame(swing);
</script>

</body>
</html>
