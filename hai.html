<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAPPY BIRTHDAY TWIN!!!!!</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1: #0f0a0b;
      --bg2: #1c1013;
      --panel: #f7f0e8;
      --ink: #111111;
      --red: #c1121f;
      --red2: #8f0d18;
      --cream: #fff8ef;
      --yellow: #ffd54a;
      --green: #42d77d;
      --shadow: rgba(0,0,0,0.35);
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(193,18,31,0.18), transparent 24%),
        radial-gradient(circle at 85% 20%, rgba(66,215,125,0.08), transparent 18%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 12px 12px;
      opacity: 0.16;
      mix-blend-mode: screen;
    }

    .sticker {
      position: fixed;
      z-index: 1;
      width: clamp(72px, 13vw, 130px);
      pointer-events: none;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.28));
      user-select: none;
    }

    .sticker.left {
      left: 14px;
      top: 12px;
      transform: rotate(-10deg);
    }

    .sticker.right {
      right: 14px;
      bottom: 14px;
      transform: rotate(10deg);
      width: clamp(82px, 15vw, 140px);
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(92vw, 560px);
      background: var(--panel);
      border: 4px solid var(--ink);
      border-radius: 24px;
      padding: 24px 18px 20px;
      box-shadow:
        0 0 0 6px var(--red),
        0 20px 45px var(--shadow);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px) rotate(-0.4deg);
      box-shadow:
        0 0 0 6px var(--red),
        0 26px 55px rgba(0,0,0,0.42);
    }

    .card::before {
      content: "BAM!";
      position: absolute;
      top: 10px;
      left: 12px;
      color: var(--yellow);
      font-size: 18px;
      font-weight: 900;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
      transform: rotate(-10deg);
    }

    .card::after {
      content: "!!!";
      position: absolute;
      top: 10px;
      right: 14px;
      color: var(--red);
      font-size: 28px;
      font-weight: 900;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
      transform: rotate(8deg);
    }

    h1 {
      margin: 10px 0 16px;
      text-align: center;
      color: var(--red);
      font-size: clamp(28px, 6vw, 40px);
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
    }

    .message-box {
      background: var(--cream);
      border: 3px solid var(--ink);
      border-radius: 18px;
      padding: 16px;
      box-shadow: inset 0 0 0 3px rgba(193,18,31,0.08);
      min-height: 120px;
    }

    .message-box p {
      margin: 0;
      color: #222;
      font-size: 15px;
      line-height: 1.65;
      font-weight: 700;
    }

    .action-row {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    .crowbar-btn {
      border: 3px solid var(--ink);
      background: linear-gradient(180deg, #ff4154, var(--red));
      color: white;
      border-radius: 18px;
      width: 72px;
      height: 64px;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 6px 0 var(--ink);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .crowbar-btn:hover {
      transform: translateY(2px);
      box-shadow: 0 4px 0 var(--ink);
    }

    .crowbar-btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 var(--ink);
    }

    .small-note {
      margin-top: 12px;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      color: #4d4d4d;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .confetti {
      position: fixed;
      top: -12px;
      width: 10px;
      height: 18px;
      opacity: 0.95;
      z-index: 0;
      animation: fall linear forwards;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
      }
      100% {
        transform: translateY(115vh) rotate(720deg);
      }
    }

    @media (max-width: 600px) {
      .card {
        padding: 22px 14px 18px;
      }

      .message-box {
        padding: 14px;
        min-height: 110px;
      }

      .message-box p {
        font-size: 14px;
      }

      .sticker.left {
        left: 8px;
        top: 8px;
      }

      .sticker.right {
        right: 8px;
        bottom: 8px;
      }
    }
  </style>
</head>
<body>
  <img
    class="sticker left"
    src="https://ih1.redbubble.net/image.4304496734.6416/raf%2C360x360%2C075%2Ct%2Cfafafa%3Aca443f4786.u1.jpg"
    alt="Jason Todd chibi sticker"
  />

  <img
    class="sticker right"
    src="https://e7.pngegg.com/pngimages/211/33/png-clipart-chibiusa-jason-todd-art-drawing-chibi-superhero-chibi.png"
    alt="Jason Todd chibi"
  />

  <audio id="partyblower" src="partyblower.mp3" preload="auto"></audio>
  <audio id="confettiSound" src="confetti.mp3" preload="auto"></audio>

  <div class="card" id="birthdayCard">
    <h1>HAPPY BIRTHDAY TWIN!!</h1>

    <div class="message-box">
      <p>
        Write your paragraph here. Replace this with whatever you want to say —
        sweet, funny, dramatic, chaotic, sentimental, or all of it together.
        This whole box is just for your message.
      </p>
    </div>

    <div class="action-row">
      <button type="button" class="crowbar-btn" id="giftButton">🪓</button>
    </div>

    <div class="small-note">tap anywhere</div>
  </div>

  <script>
    const blower = document.getElementById("partyblower");
    const confettiSound = document.getElementById("confettiSound");
    const birthdayCard = document.getElementById("birthdayCard");
    const giftButton = document.getElementById("giftButton");

    let hasStarted = false;

    function spawnConfetti(count = 90) {
      const colors = ["#c1121f", "#ffd54a", "#ffffff", "#42d77d", "#111111"];

      for (let i = 0; i < count; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2.6 + Math.random() * 2.4) + "s";
        piece.style.animationDelay = (Math.random() * 0.8) + "s";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        piece.style.borderRadius = Math.random() > 0.5 ? "2px" : "999px";
        document.body.appendChild(piece);

        setTimeout(() => {
          piece.remove();
        }, 6000);
      }
    }

    function tryOpenSounds() {
      blower.play().catch(() => {});
      setTimeout(() => {
        confettiSound.play().catch(() => {});
      }, 220);
    }

    function goNext() {
      window.location.href = "hai.html";
    }

    function startSurprise() {
      if (hasStarted) return;
      hasStarted = true;

      tryOpenSounds();

      setTimeout(() => {
        goNext();
      }, 1400);
    }

    window.addEventListener("load", () => {
      spawnConfetti(110);
      tryOpenSounds();
    });

    birthdayCard.addEventListener("click", startSurprise);

    giftButton.addEventListener("click", function (e) {
      e.stopPropagation();
      startSurprise();
    });
  </script>
</body>
</html>
