<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Swing Hit</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #00a782;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .scene {
      position: relative;
      width: 90vw;
      max-width: 700px;
      height: 70vh;
    }

    /* left image */
    .img1 {
      position: absolute;
      width: 28vw;
      max-width: 180px;
      left: 0;
      top: 45%;
      transform: translateY(-50%);
      border-radius: 12px;
      z-index: 1;
    }

    /* right image (target) */
    .img2 {
      position: absolute;
      width: 28vw;
      max-width: 180px;
      right: 0;
      top: 45%;
      transform: translateY(-50%);
      z-index: 2;
      border-radius: 12px;
      transition: transform 0.12s ease;
    }

    /* swinger wrapper */
    .swing-wrap {
      position: absolute;
      left: 50%;
      top: 4%;
      width: 160px;
      height: 280px;
      transform: translateX(-50%);
      transform-origin: top center;
      z-index: 3;
    }

    .rope {
      position: absolute;
      left: 50%;
      top: 0;
      width: 4px;
      height: 110px;
      background: #ffffffcc;
      transform: translateX(-50%);
      border-radius: 3px;
    }

    .img3 {
      position: absolute;
      left: 50%;
      top: 100px;
      width: 34vw;
      max-width: 210px;
      transform: translateX(-50%);
      border-radius: 12px;
      display: block;
    }

    .hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.18);
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="scene">
    <img
      class="img1"
      src="https://preview.redd.it/freaky-joker-joker-tongue-out-manually-cleaned-up-crop-in-v0-3qegwopj2feg1.png?width=640&crop=smart&auto=webp&s=a6fd105db2b724f08340d512f31e7d0012427eaa"
      alt="Left image"
      id="img1"
    />

    <img
      class="img2"
      src="https://fatson-toddplushies.com/wp-content/uploads/2025/11/Fat-Jason-Todd-Plush-bg-1762948768-300x300.png"
      alt="Target image"
      id="img2"
    />

    <div class="swing-wrap" id="swingWrap">
      <div class="rope"></div>

      <!-- Replace with your actual swinger image -->
      <img
        class="img3"
        src="img3.png"
        alt="Swinging image"
        id="img3"
      />
    </div>
  </div>

  <!-- Replace with your actual sound file -->
  <audio id="bonk" src="bonk.mp3" preload="auto"></audio>

  <div class="hint">tap anywhere to bonk</div>

  <script>
    const swingWrap = document.getElementById("swingWrap");
    const target = document.getElementById("img2");
    const bonk = document.getElementById("bonk");

    let angle = -35;
    let speed = 1.2;
    let direction = 1;
    let isForcedHit = false;

    const minAngle = -35;
    const maxAngle = 35;

    function animate() {
      if (!isForcedHit) {
        angle += speed * direction;

        if (angle >= maxAngle) {
          angle = maxAngle;
          direction = -1;
        }

        if (angle <= minAngle) {
          angle = minAngle;
          direction = 1;
        }
      }

      swingWrap.style.transform = `translateX(-50%) rotate(${angle}deg)`;
      requestAnimationFrame(animate);
    }

    function bonkTarget() {
      bonk.currentTime = 0;
      bonk.play().catch(() => {});

      target.style.transform = "translateY(-50%) scale(1.08)";
      setTimeout(() => {
        target.style.transform = "translateY(-50%) scale(1)";
      }, 120);
    }

    document.body.addEventListener("click", () => {
      if (isForcedHit) return;

      isForcedHit = true;
      angle = 70;
      swingWrap.style.transform = `translateX(-50%) rotate(${angle}deg)`;
      bonkTarget();

      setTimeout(() => {
        angle = 20;
        direction = -1;
        isForcedHit = false;
      }, 180);
    });

    requestAnimationFrame(animate);
  </script>
</body>
</html>
