<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fatson Bonks Joker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1: #f4eee6;
      --bg2: #ddd1c5;
      --paper: rgba(255, 250, 244, 0.84);
      --ink: #4a3f39;
      --soft: #6f6159;
      --accent: #8e6a74;
      --accent2: #7f96a8;
      --line: rgba(95, 78, 69, 0.15);
      --shadow: rgba(80, 63, 53, 0.16);
      --bonk: #f4bf4f;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(127, 150, 168, 0.18), transparent 26%),
        radial-gradient(circle at bottom right, rgba(142, 106, 116, 0.16), transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 27px,
          rgba(100, 85, 78, 0.04) 28px
        );
      opacity: 0.55;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* STICKERS */
    .sticker {
      position: absolute;
      z-index: 1;
      width: clamp(62px, 10vw, 110px);
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.12));
      opacity: 0.96;
      transition: opacity 0.35s ease, transform 0.35s ease;
      animation: stickerFloat 2.4s ease-in-out infinite;
    }

    .sticker.changing {
      opacity: 0.3;
    }

    .sticker.tl { top: 10px; left: 10px; --rot: -8deg; --dx: -2px; --dy: 3px; }
    .sticker.tr { top: 10px; right: 10px; --rot: 8deg; --dx: 2px; --dy: 2px; }
    .sticker.bl { bottom: 10px; left: 10px; --rot: 6deg; --dx: -3px; --dy: -2px; }
    .sticker.br { bottom: 10px; right: 10px; --rot: -6deg; --dx: 3px; --dy: -2px; }

    @keyframes stickerFloat {
      0%   { transform: rotate(var(--rot)) translate(0px, 0px); }
      25%  { transform: rotate(calc(var(--rot) - 1.2deg)) translate(var(--dx), var(--dy)); }
      50%  { transform: rotate(calc(var(--rot) + 1deg)) translate(calc(var(--dx) * -0.5), calc(var(--dy) * -0.5)); }
      75%  { transform: rotate(calc(var(--rot) - 0.8deg)) translate(calc(var(--dx) * 0.7), calc(var(--dy) * -0.4)); }
      100% { transform: rotate(var(--rot)) translate(0px, 0px); }
    }

    .fatson-wrap,
    .joker-wrap {
      position: absolute;
      background: var(--paper);
      border: 1.5px solid var(--line);
      border-radius: 26px;
      overflow: hidden;
      box-shadow:
        0 18px 34px var(--shadow),
        inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .fatson-wrap::before,
    .joker-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top right, rgba(127,143,161,0.08), transparent 28%),
        radial-gradient(circle at bottom left, rgba(142,106,116,0.06), transparent 26%);
    }

    .fatson-wrap {
      left: 4vw;
      top: 56%;
      width: clamp(120px, 26vw, 240px);
      transform: translateY(-50%);
      z-index: 2;
    }

    .joker-wrap {
      right: 4vw;
      top: 52%;
      width: clamp(120px, 26vw, 240px);
      transform: translateY(-50%);
      z-index: 2;
    }

    .fatson,
    .joker {
      display: block;
      width: 100%;
      position: relative;
      z-index: 1;
      user-select: none;
      -webkit-user-drag: none;
    }

    .joker {
      transition: transform 0.1s ease, filter 0.1s ease;
    }

    .joker.hit {
      filter: saturate(1.8) sepia(0.5) hue-rotate(-18deg) brightness(0.92);
    }

    .arm {
      position: absolute;
      z-index: 4;
      transform-origin: 16px 16px;
      pointer-events: none;
    }

    .crowbar {
      width: 100%;
      display: block;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.22));
      user-select: none;
      -webkit-user-drag: none;
    }

    .bonk {
      position: absolute;
      font-weight: 900;
      font-size: clamp(28px, 5vw, 52px);
      color: var(--bonk);
      text-shadow:
        -2px -2px 0 #ffffff,
         2px -2px 0 #ffffff,
        -2px  2px 0 #ffffff,
         2px  2px 0 #ffffff,
         0 6px 8px rgba(0,0,0,0.12);
      opacity: 0;
      transform: scale(0.6) rotate(-8deg);
      transition: opacity 0.12s ease, transform 0.12s ease;
      z-index: 6;
      pointer-events: none;
    }

    .bonk.show {
      opacity: 1;
      transform: scale(1) rotate(-8deg);
    }

    .flash {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.08s ease;
      z-index: 5;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      color: var(--ink);
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(95, 78, 69, 0.14);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.6px;
      text-transform: lowercase;
      z-index: 7;
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }

    .shake {
      animation: shake 0.18s linear;
    }

    @keyframes shake {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-5px, 2px); }
      50% { transform: translate(4px, -2px); }
      75% { transform: translate(-3px, 1px); }
      100% { transform: translate(0, 0); }
    }

    @media (max-width: 700px) {
      .fatson-wrap {
        left: 2vw;
        top: 60%;
        width: 34vw;
      }

      .joker-wrap {
        right: 2vw;
        top: 54%;
        width: 34vw;
      }

      .hint {
        bottom: 12px;
        font-size: 12px;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <!-- stickers -->
    <img class="sticker tl" id="sticker-tl" alt="">
    <img class="sticker tr" id="sticker-tr" alt="">
    <img class="sticker bl" id="sticker-bl" alt="">
    <img class="sticker br" id="sticker-br" alt="">

    <div class="fatson-wrap" id="fatsonWrap">
      <img src="fatson.png" class="fatson" id="fatson" alt="Fatson" />
    </div>

    <div class="joker-wrap" id="jokerWrap">
      <img src="joker.png" class="joker" id="joker" alt="Joker" />
    </div>

    <div class="arm" id="arm">
      <img src="crowbar.png" class="crowbar" id="crowbar" alt="Crowbar" />
    </div>

    <div class="bonk" id="bonkText">BONK!</div>
    <div class="flash" id="flash"></div>
    <div class="hint">tap anywhere</div>

    <audio id="bonkSound" preload="auto">
      <source src="bonk.mp3" type="audio/mpeg" />
    </audio>
  </div>

  <script>
    const scene = document.getElementById("scene");
    const fatson = document.getElementById("fatson");
    const joker = document.getElementById("joker");
    const jokerWrap = document.getElementById("jokerWrap");
    const arm = document.getElementById("arm");
    const bonkText = document.getElementById("bonkText");
    const flash = document.getElementById("flash");
    const sound = document.getElementById("bonkSound");

    // stickers
    const stickerEls = [
      document.getElementById("sticker-tl"),
      document.getElementById("sticker-tr"),
      document.getElementById("sticker-bl"),
      document.getElementById("sticker-br")
    ];
    const stickerFiles = [
  "stickers1.png",
  "stickers2.png",
  "stickers3.png",
  "stickers4.png",
  "stickers5.png",
  "stickers6.png",
  "stickers7.png",
  "stickers8.png",
  "stickers9.png",
  "stickers10.png",
  "stickers11.png",
  "stickers12.png",
  "stickers13.png",
  "stickers14.png",
  "stickers15.png",
  "stickers16.png",
  "stickers17.png",
  "stickers18.png",
  "stickers19.png",
  "stickers20.png",
  "stickers21.png",
  "stickers22.png",
  "stickers23.png",
  "stickers24.png"
];
    let idleAngle = -18;
    let direction = 1;
    let busy = false;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function setStickerSet() {
      const picks = shuffle(stickerFiles).slice(0, 4);
      stickerEls.forEach((el) => el.classList.add("changing"));

      setTimeout(() => {
        stickerEls.forEach((el, i) => {
          el.src = picks[i];
        });
      }, 140);

      setTimeout(() => {
        stickerEls.forEach((el) => el.classList.remove("changing"));
      }, 220);
    }

    function startStickerCycle() {
      setStickerSet();
      setInterval(setStickerSet, 3200);
    }

    function safePlay(audio) {
      audio.currentTime = 0;
      const p = audio.play();
      if (p && typeof p.catch === "function") {
        p.catch(() => {});
      }
    }

    function placeArm() {
      const fat = fatson.getBoundingClientRect();
      const jokerBox = jokerWrap.getBoundingClientRect();
      const sceneBox = scene.getBoundingClientRect();

      const crowbarWidth = Math.min(window.innerWidth * 0.27, 220);

      const anchorX = fat.left - sceneBox.left + fat.width * 0.82;
      const anchorY = fat.top - sceneBox.top + fat.height * 0.46;

      const targetX = jokerBox.left - sceneBox.left + jokerBox.width * 0.18;
      const targetY = jokerBox.top - sceneBox.top + jokerBox.height * 0.5;

      const dx = targetX - anchorX;
      const dy = targetY - anchorY;
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;

      arm.style.left = anchorX + "px";
      arm.style.top = anchorY + "px";
      arm.style.width = crowbarWidth + "px";
      arm.dataset.baseAngle = angle;
      arm.style.transform = `rotate(${angle + idleAngle}deg)`;

      bonkText.style.left = (jokerBox.left - sceneBox.left + jokerBox.width * 0.08) + "px";
      bonkText.style.top = (jokerBox.top - sceneBox.top - 24) + "px";
    }

    function idleSwing() {
      if (!busy) {
        const base = parseFloat(arm.dataset.baseAngle || "0");
        idleAngle += 0.35 * direction;

        if (idleAngle > -8) direction = -1;
        if (idleAngle < -18) direction = 1;

        arm.style.transform = `rotate(${base + idleAngle}deg)`;
      }

      requestAnimationFrame(idleSwing);
    }

    function hit() {
      if (busy) return;
      busy = true;

      const base = parseFloat(arm.dataset.baseAngle || "0");

      arm.style.transition = "transform 0.1s ease-out";
      arm.style.transform = `rotate(${base - 26}deg)`;

      setTimeout(() => {
        arm.style.transform = `rotate(${base + 4}deg)`;

        joker.classList.add("hit");
        joker.style.transform = "translateX(12px) scale(0.97)";
        joker.src = "joker2.png";

        bonkText.classList.add("show");
        flash.style.opacity = "1";
        scene.classList.add("shake");

        safePlay(sound);
      }, 110);

      setTimeout(() => {
        flash.style.opacity = "0";
        joker.style.transform = "translateX(0) scale(1)";
        joker.classList.remove("hit");
        joker.src = "joker.png";
        scene.classList.remove("shake");
      }, 300);

      setTimeout(() => {
        arm.style.transition = "transform 0.24s ease-in-out";
        arm.style.transform = `rotate(${base - 12}deg)`;
        bonkText.classList.remove("show");
      }, 320);

      setTimeout(() => {
        idleAngle = -12;
        busy = false;
      }, 520);
    }

    window.addEventListener("load", () => {
      startStickerCycle();
      placeArm();
      idleSwing();
    });

    window.addEventListener("resize", placeArm);

    document.body.addEventListener("click", hit);
    document.body.addEventListener("touchstart", hit, { passive: true });
  </script>
</body>
</html>
