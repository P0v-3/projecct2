<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAPPY BIRTHDAY TWIN!!!!!</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(233deg, #8d0000, #380000);
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      max-width: 400px;
      width: 90%;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(24px, 5vw, 32px);
      color: #222;
    }

    p {
      color: #555;
      margin-bottom: 18px;
    }

    button {
      margin-top: 10px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #ff4e50;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #ff2e33;
    }

    .card img {
      width: 100%;
      max-width: 250px;
      margin-top: 20px;
      border-radius: 14px;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <!-- Replace these with your actual audio files -->
  <audio id="partyblower" src="partyblower.mp3" preload="auto"></audio>
  <audio id="confetti" src="confetti.mp3" preload="auto"></audio>

  <div class="card" id="birthdayCard">
    <h1>HAPPY BIRTHDAY TWINNNN!!</h1>
    <p>I GOT SOMETHING FOR UUUU!! 🎁</p>

    <button type="button" id="giftButton">noclick (jk)</button>

    <!-- Replace with your actual image -->
    <img src="image_filename.jpg" alt="Birthday surprise" />
  </div>

  <script>
    const blower = document.getElementById("partyblower");
    const confetti = document.getElementById("confetti");
    const birthdayCard = document.getElementById("birthdayCard");
    const giftButton = document.getElementById("giftButton");

    let hasStarted = false;

    function goNext() {
      window.location.href = "hai.html";
    }

    function startSurprise() {
      if (hasStarted) return;
      hasStarted = true;

      // Try playing sounds. If browser blocks autoplay, redirect still works.
      blower.play().catch(() => {});
      setTimeout(() => {
        confetti.play().catch(() => {});
      }, 500);

      setTimeout(() => {
        goNext();
      }, 1500);
    }

    birthdayCard.addEventListener("click", startSurprise);
    giftButton.addEventListener("click", function (e) {
      e.stopPropagation();
      startSurprise();
    });
  </script>
</body>
</html>
