<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPPY BIRTHDAY TWIN!!!!!</title>

<style>
*{box-sizing:border-box}

:root{
--bg1:#b83312;
--bg2:#a4947e;
--paper:rgba(255,250,244,.88);
--ink:#4a3f39;
--soft:#6f6159;
--accent:#8e6a74;
--accent2:#7f96a8;
--line:rgba(95,78,69,.15);
--shadow:rgba(80,63,53,.16);
}

body{
margin:0;
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:18px;
font-family:"Trebuchet MS",Arial,sans-serif;
background:
radial-gradient(circle at top left,rgba(127,150,168,.18),transparent 26%),
radial-gradient(circle at bottom right,rgba(142,106,116,.16),transparent 24%),
linear-gradient(135deg,var(--bg1),var(--bg2));
}

.sticker{
position:absolute;
z-index:1;
width:clamp(62px,10vw,110px);
pointer-events:none;
filter:drop-shadow(0 8px 14px rgba(0,0,0,.12));
transition:opacity .35s ease;
animation:float 2.4s ease-in-out infinite;
}

.sticker.changing{opacity:.3}

.sticker.tl{top:10px;left:10px}
.sticker.tr{top:10px;right:10px}
.sticker.bl{bottom:10px;left:10px}
.sticker.br{bottom:10px;right:10px}

@keyframes float{
0%{transform:translate(0,0)}
50%{transform:translate(3px,-3px)}
100%{transform:translate(0,0)}
}

.card{
position:relative;
z-index:2;
width:min(92vw,560px);
background:var(--paper);
border-radius:28px;
padding:26px 18px 20px;
box-shadow:0 18px 40px var(--shadow);
}

h1{
text-align:center;
color:var(--ink);
font-size:clamp(28px,6vw,40px);
font-weight:800;
}

.message-box{
background:rgba(255,255,255,.7);
border-radius:20px;
padding:16px;
}

.message-box p{
margin:0;
color:var(--soft);
font-size:15px;
line-height:1.7;
font-weight:600;
}

.action-row{
display:flex;
justify-content:center;
margin-top:18px;
}

.crowbar-btn{
border:0;
background:linear-gradient(180deg,var(--accent2),var(--accent));
color:white;
border-radius:18px;
width:72px;
height:62px;
font-size:28px;
cursor:pointer;
}

.small-note{
margin-top:12px;
text-align:center;
color:var(--soft);
font-size:12px;
font-weight:700;
}

.confetti{
position:fixed;
top:-12px;
width:10px;
height:16px;
opacity:.9;
z-index:0;
animation:fall linear forwards;
border-radius:999px;
}

@keyframes fall{
from{transform:translateY(-10vh) rotate(0)}
to{transform:translateY(115vh) rotate(720deg)}
}
</style>
</head>

<body>

<img class="sticker tl" id="sticker-tl">
<img class="sticker tr" id="sticker-tr">
<img class="sticker bl" id="sticker-bl">
<img class="sticker br" id="sticker-br">

<audio id="partyblower" src="partyblower.mp3"></audio>
<audio id="confettiSound" src="confetti.mp3"></audio>

<div class="card">
<h1>HAPPY BIRTHDAY TWIN!! 🎂!</h1>

<div class="message-box">
<p>
TWIN YOUR 14 FINALLY(took you long enough). WOW HAPPY BIRTHDAY IM SORRY I CANT BE THERE BUT HOPEFULLY
NEXT TIME!!! I HOPE YOU KNOW YOU'RE A WONDERFUL FRIEND, AND REALLLLY FUN TO TALK TO.
ENJOY THE PINATA!!!! -@fizavocadoes
</p>
</div>

<div class="action-row">
<button class="crowbar-btn" id="giftButton">🪓</button>
</div>

<div class="small-note">tap the button</div>
</div>

<script>

const blower=document.getElementById("partyblower");
const confettiSound=document.getElementById("confettiSound");
const giftButton=document.getElementById("giftButton");

const stickerEls=[
document.getElementById("sticker-tl"),
document.getElementById("sticker-tr"),
document.getElementById("sticker-bl"),
document.getElementById("sticker-br")
];

const stickerFiles=[
"stickers1.png","stickers2.png","stickers3.png","stickers4.png",
"stickers5.png","stickers6.png","stickers7.png","stickers8.png",
"stickers9.png","stickers10.png","stickers11.png","stickers12.png",
"stickers13.png","stickers14.png","stickers15.png","stickers16.png",
"stickers17.png","stickers18.png","stickers19.png","stickers20.png",
"stickers21.png","stickers22.png","stickers23.png","stickers24.png"
];

let redirectStarted=false;
let redirectTimer=null;

function preloadStickers(list){
return Promise.all(list.map(src=>{
return new Promise(res=>{
const img=new Image();
img.src=src;
img.onload=res;
img.onerror=res;
});
}));
}

function shuffle(arr){
const a=[...arr];
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

function setStickerSet(){
const picks=shuffle(stickerFiles).slice(0,4);

stickerEls.forEach(el=>el.classList.add("changing"));

setTimeout(()=>{
stickerEls.forEach((el,i)=>{
el.src=picks[i];
});
},100);

setTimeout(()=>{
stickerEls.forEach(el=>el.classList.remove("changing"));
},260);
}

function startStickerCycle(){
setStickerSet();
setInterval(setStickerSet,3200);
}

function spawnConfetti(count=90){
const colors=["#8e6a74","#7f96a8","#ffffff","#d8c3a5","#6f6159"];

for(let i=0;i<count;i++){
const piece=document.createElement("div");
piece.className="confetti";

piece.style.left=Math.random()*100+"vw";
piece.style.background=colors[Math.floor(Math.random()*colors.length)];
piece.style.animationDuration=(3+Math.random()*2)+"s";

document.body.appendChild(piece);

setTimeout(()=>piece.remove(),6000);
}
}

function goNext(){
window.location.href="hai.html";
}

giftButton.addEventListener("click",()=>{

if(redirectStarted){
if(redirectTimer)clearTimeout(redirectTimer);
goNext();
return;
}

redirectStarted=true;

spawnConfetti(110);

blower.currentTime=0;
confettiSound.currentTime=0;

blower.play().catch(()=>{});
confettiSound.play().catch(()=>{});

redirectTimer=setTimeout(()=>{
goNext();
},4500);

});

window.addEventListener("load",async()=>{
await preloadStickers(stickerFiles);
startStickerCycle();
});

</script>

</body>
</html>
