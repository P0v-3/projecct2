<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAPPY BIRTHDAY TWIN!!!!!</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg1: #b83312;
      --bg2: #a4947e;
      --paper: rgba(255, 250, 244, 0.9);
      --ink: #4a3f39;
      --soft: #6f6159;
      --accent: #8e6a74;
      --accent2: #7f96a8;
      --line: rgba(95, 78, 69, 0.15);
      --shadow: rgba(80, 63, 53, 0.16);
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(127, 150, 168, 0.18), transparent 26%),
        radial-gradient(circle at bottom right, rgba(142, 106, 116, 0.16), transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 27px,
          rgba(100, 85, 78, 0.04) 28px
        );
      opacity: 0.55;
    }

    .sticker {
      position: fixed;
      z-index: 1;
      width: clamp(72px, 16vw, 128px);
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.12));
      opacity: 0.96;
      transition: opacity 0.35s ease, transform 0.35s ease;
      animation: stickerFloat 2.4s ease-in-out infinite;
    }

    .sticker.changing {
      opacity: 0.35;
    }

    .sticker.tl { top: 8px; left: 8px; }
    .sticker.tr { top: 8px; right: 8px; }
    .sticker.bl { bottom: 8px; left: 8px; }
    .sticker.br { bottom: 8px; right: 8px; }

    .sticker.tl { --rot: -8deg; --dx: -2px; --dy: 3px; }
    .sticker.tr { --rot: 8deg; --dx: 2px; --dy: 2px; }
    .sticker.bl { --rot: 6deg; --dx: -3px; --dy: -2px; }
    .sticker.br { --rot: -6deg; --dx: 3px; --dy: -2px; }

    @keyframes stickerFloat {
      0%   { transform: rotate(var(--rot)) translate(0px, 0px); }
      25%  { transform: rotate(calc(var(--rot) - 1.2deg)) translate(var(--dx), var(--dy)); }
      50%  { transform: rotate(calc(var(--rot) + 1deg)) translate(calc(var(--dx) * -0.5), calc(var(--dy) * -0.5)); }
      75%  { transform: rotate(calc(var(--rot) - 0.8deg)) translate(calc(var(--dx) * 0.7), calc(var(--dy) * -0.4)); }
      100% { transform: rotate(var(--rot)) translate(0px, 0px); }
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(94vw, 640px);
      background: var(--paper);
      backdrop-filter: blur(8px);
      border: 1.5px solid var(--line);
      border-radius: 28px;
      padding: 24px 16px 20px;
      box-shadow:
        0 18px 40px var(--shadow),
        inset 0 1px 0 rgba(255,255,255,0.72);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(127,143,161,0.10), transparent 28%),
        radial-gradient(circle at bottom left, rgba(138,90,98,0.08), transparent 26%);
      pointer-events: none;
    }

    h1 {
      position: relative;
      margin: 0 0 16px;
      text-align: center;
      color: var(--ink);
      font-size: clamp(30px, 7vw, 46px);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0.4px;
    }

    .message-box {
      position: relative;
      background: rgba(255,255,255,0.62);
      border: 1.5px solid rgba(90,72,63,0.12);
      border-radius: 20px;
      padding: 16px;
      min-height: 120px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .message-box p {
      margin: 0;
      color: var(--soft);
      font-size: 15px;
      line-height: 1.7;
      font-weight: 700;
      text-align: center;
    }

    .action-row {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    .giant-btn {
      width: min(88vw, 420px);
      min-height: 96px;
      border: 0;
      border-radius: 26px;
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      color: white;
      font-size: clamp(26px, 6vw, 38px);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(127, 150, 168, 0.28);
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
      padding: 18px 20px;
    }

    .giant-btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 18px 34px rgba(127, 150, 168, 0.34);
    }

    .giant-btn:active {
      transform: scale(0.97);
      opacity: 0.94;
    }

    .small-note {
      margin-top: 12px;
      text-align: center;
      color: var(--soft);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: lowercase;
    }

    .confetti {
      position: fixed;
      top: -12px;
      width: 10px;
      height: 16px;
      opacity: 0.92;
      z-index: 10;
      animation: fall linear forwards;
      border-radius: 999px;
      pointer-events: none;
    }

    @keyframes fall {
      from { transform: translateY(-10vh) rotate(0deg); }
      to   { transform: translateY(115vh) rotate(720deg); }
    }

    @media (max-width: 600px) {
      .card {
        padding: 20px 12px 16px;
        border-radius: 24px;
      }

      .message-box {
        min-height: 104px;
        padding: 14px;
      }

      .message-box p {
        font-size: 14px;
      }

      .giant-btn {
        min-height: 88px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <img class="sticker tl" id="sticker-tl" alt="">
  <img class="sticker tr" id="sticker-tr" alt="">
  <img class="sticker bl" id="sticker-bl" alt="">
  <img class="sticker br" id="sticker-br" alt="">

  <audio id="partyblower" src="partyblower.mp3" preload="auto"></audio>
  <audio id="confettiSound" src="confetti.mp3" preload="auto"></audio>

  <div class="card">
    <h1>HAPPY BIRTHDAY TWIN!! 🎂</h1>

    <div class="message-box">
      <p>
        TWIN YOUR 14 FINALLY (took you long enough). WOW HAPPY BIRTHDAY. I HOPE YOU HAVE THE BEST DAY EVER.
      </p>
    </div>

    <div class="action-row">
      <button type="button" class="giant-btn" id="startButton">OPEN NOW 🪓</button>
    </div>

    <div class="small-note">tap once</div>
  </div>

  <script>
    const blower = document.getElementById("partyblower");
    const confettiSound = document.getElementById("confettiSound");
    const startButton = document.getElementById("startButton");

    const stickerEls = [
      document.getElementById("sticker-tl"),
      document.getElementById("sticker-tr"),
      document.getElementById("sticker-bl"),
      document.getElementById("sticker-br")
    ];

    const stickerFiles = [
      "stickers1.png",
      "stickers2.png",
      "stickers3.png",
      "stickers4.png",
      "stickers5.png",
      "stickers6.png",
      "stickers7.png",
      "stickers8.png",
      "stickers9.png",
      "stickers10.png"
    ];

    let alreadyStarted = false;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function setStickerSet() {
      const picks = shuffle(stickerFiles).slice(0, 4);
      stickerEls.forEach(el => el.classList.add("changing"));

      setTimeout(() => {
        stickerEls.forEach((el, i) => {
          el.src = picks[i];
        });
      }, 140);

      setTimeout(() => {
        stickerEls.forEach(el => el.classList.remove("changing"));
      }, 220);
    }

    function startStickerCycle() {
      setStickerSet();
      setInterval(setStickerSet, 3200);
    }

    function spawnConfetti(count = 120) {
      const colors = ["#8e6a74", "#7f96a8", "#ffffff", "#d8c3a5", "#6f6159", "#ffd166"];
      for (let i = 0; i < count; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2.6 + Math.random() * 2.2) + "s";
        piece.style.animationDelay = (Math.random() * 0.45) + "s";
        piece.style.width = (7 + Math.random() * 6) + "px";
        piece.style.height = (12 + Math.random() * 9) + "px";
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5500);
      }
    }

    function playParty() {
      blower.currentTime = 0;
      confettiSound.currentTime = 0;
      blower.play().catch(() => {});
      setTimeout(() => {
        confettiSound.play().catch(() => {});
      }, 120);
    }

    function startSequence() {
      if (alreadyStarted) return;
      alreadyStarted = true;

      startButton.disabled = true;
      startButton.textContent = "GOING...";
      spawnConfetti(140);
      playParty();

      setTimeout(() => {
        window.location.href = "hai.html";
      }, 1400);
    }

    window.addEventListener("load", startStickerCycle);
    startButton.addEventListener("click", startSequence);
  </script>
</body>
</html>
